[alembic]
# Path to the alembic directory
script_location = %(here)s/alembic

# Path to the versions directory
version_locations = %(here)s/alembic/versions

# Template for revision filenames
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# SQLAlchemy connection URL — overridden in env.py from .env
sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/vetscribe

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
